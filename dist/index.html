<body>
  <!-- Loading Screen -->
  <div id="loading" style="
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, #f8fafc 0%, #ecfdf5 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    font-family: 'Geist', sans-serif;
  ">
    <div style="text-align: center;">
      <div style="font-size: 60px; margin-bottom: 20px;">🐄</div>
      <h1 style="font-size: 28px; font-weight: 700; color: #047857; margin-bottom: 10px;">AgroPro</h1>
      <p style="font-size: 14px; color: #64748b;">Cargando la finca...</p>
      <div style="margin-top: 30px; display: flex; gap: 4px; justify-content: center;">
        <div style="width: 8px; height: 8px; background: #047857; border-radius: 50%; animation: bounce 1.4s infinite;"></div>
        <div style="width: 8px; height: 8px; background: #047857; border-radius: 50%; animation: bounce 1.4s infinite 0.2s;"></div>
        <div style="width: 8px; height: 8px; background: #047857; border-radius: 50%; animation: bounce 1.4s infinite 0.4s;"></div>
      </div>
    </div>
    <style>
      @keyframes bounce {
        0%, 80%, 100% { transform: scaleY(1); }
        40% { transform: scaleY(0.4); }
      }
    </style>
  </div>

  <!-- React App Root -->
  <div id="root"></div>

  <!-- Service Worker Registration -->
  <script>
    // Solo registrar en HTTPS o localhost (evita non-app-bound domain error)
    const isHTTPS = location.protocol === 'https:';
    const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    const canRegisterSW = isHTTPS || isLocalhost;
    
    if ('serviceWorker' in navigator && canRegisterSW) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
          .then(reg => {
            console.log('✓ Service Worker registrado correctamente');
          })
          .catch(err => {
            console.log('Service Worker error (esperado en algunos dominios):', err.message);
          });
      });
    } else if (!canRegisterSW && 'serviceWorker' in navigator) {
      console.log('ℹ️ Service Worker requiere HTTPS o localhost. Offline funciona igual.');
    }
    
    // Detectar cambios online/offline
    window.addEventListener('online', () => {
      console.log('✓ Conectado');
    });
    
    window.addEventListener('offline', () => {
      console.log('✗ Modo offline');
    });
    
    // Ocultar loading cuando React carga
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loading = document.getElementById('loading');
        if (loading) {
          loading.style.opacity = '0';
          loading.style.transition = 'opacity 0.3s ease-out';
          setTimeout(() => {
            loading.style.display = 'none';
          }, 300);
        }
      }, 300);
    });
    
    // Prevenir zoom accidental en iOS
    document.addEventListener('touchmove', (e) => {
      if (e.scale !== 1) {
        e.preventDefault();
      }
    }, { passive: false });
  </script>

  <!-- React (Vite maneja las dependencias) -->
</body>
